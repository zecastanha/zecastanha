<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zé Castanha 9</title>
    <!-- Open Graph / WhatsApp Preview -->
    <meta property="og:title" content="Zé Castanha 9">
    <meta property="og:description" content="Em breve...">
    <meta property="og:image" content="https://zecastanha.com/assets/preview.png">
    <meta property="og:url" content="https://zecastanha.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Preload da logo para carregamento instantâneo -->
    <link rel="preload" href="https://i.imgur.com/dD0K8es.png" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Canvas de fundo para as estrelas -->
    <canvas id="spaceCanvas"></canvas>

    <!-- Overlay para os flashes visuais -->
    <div id="flashOverlay" class="hidden"></div>

    <!-- Container do layout principal -->
    <div id="uiContainer">
        
        <!-- Estado Inicial -->
        <div id="initialState" class="state-panel active">
            <h2 class="star-wars-intro">Há muito tempo,<br>numa festa muito,<br>muito distante...</h2>
            <button id="btnEmbarcar" class="primary-btn">EMBARCAR</button>
        </div>

        <!-- Estado Final (Revelação) -->
        <div id="finalState" class="state-panel hidden">
            
            <!-- Menu de Navegação -->
            <nav class="premium-nav">
                <a href="index.html" class="nav-btn active" style="text-decoration: none;">INÍCIO</a>
                <span class="nav-separator">|</span>
                <a href="historia/index.html" class="nav-btn" style="text-decoration: none;">HISTÓRIA</a>
            </nav>

            <img src="https://i.imgur.com/dD0K8es.png" alt="Zé Castanha Logo" class="main-logo" id="finalLogo" loading="lazy">
            
            <div class="save-the-date" id="saveDateContainer">
                <h3 id="saveTitle" style="display: none; font-size: 1rem; font-weight: 400; letter-spacing: 5px; color: #aaa; margin-bottom: 10px;">SAVE THE DATE</h3>
                <p class="date" id="finalDate">EM BREVE</p>
            </div>

            <div class="countdown-container">
                <p class="countdown-label">Faltam:</p>
                <div id="countdown">
                    <div class="time-block">
                        <span id="days" class="time-value">00</span>
                        <span class="time-label">dias</span>
                    </div>
                    <div class="time-block">
                        <span id="hours" class="time-value">00</span>
                        <span class="time-label">horas</span>
                    </div>
                    <div class="time-block">
                        <span id="minutes" class="time-value">00</span>
                        <span class="time-label">min</span>
                    </div>
                    <div class="time-block">
                        <span id="seconds" class="time-value">00</span>
                        <span class="time-label">seg</span>
                    </div>
                </div>
            </div>

            <p class="closing-phrase" id="finalSubcopy">A saga do Zé continua.</p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
